<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard - XAUUSD & Macro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
        }
        .widget-container { 
            height: 350px; 
            width: 100%; 
            border-radius: 8px; 
            overflow: hidden; 
        }
        @media (max-width: 768px) {
            .widget-container { height: 280px; }
        }
    </style>
</head>
<body class="p-2 md:p-4 font-sans antialiased">
    <header class="mb-4">
        <h1 class="text-xl md:text-3xl font-bold text-amber-400">Trading Dashboard</h1>
        <p class="text-xs md:text-sm text-slate-400">XAUUSD Multi-Timeframe & Macro Indicators (M5)</p>
    </header>

    <main class="space-y-6 md:space-y-8">
        <!-- ส่วนที่ 1: Gold (XAUUSD) -->
        <section>
            <h2 class="text-base md:text-2xl font-bold mb-2 md:mb-4 text-amber-500 border-b border-slate-700 pb-2">Gold (XAUUSD)</h2>
            <!-- กราฟ 1 คอลัมน์บนมือถือ, 4 คอลัมน์บนจอใหญ่ -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">M5</h3>
                    <div class="widget-container" id="tv_m5"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">M15</h3>
                    <div class="widget-container" id="tv_m15"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">H1</h3>
                    <div class="widget-container" id="tv_h1"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">H4</h3>
                    <div class="widget-container" id="tv_h4"></div>
                </div>
            </div>
        </section>

        <!-- ส่วนที่ 2: Macro, Yields & Energy -->
        <section>
            <h2 class="text-base md:text-2xl font-bold mb-2 md:mb-4 text-blue-400 border-b border-slate-700 pb-2">Macro, Yields & Energy (M5 / Daily)</h2>
            <!-- กราฟ 1 คอลัมน์บนมือถือ, 3 คอลัมน์บนจอใหญ่ -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">DXY (M5)</h3>
                    <div class="widget-container" id="tv_dxy"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">US02Y (Daily)</h3>
                    <div class="widget-container" id="tv_us02y"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">US10Y (Daily)</h3>
                    <div class="widget-container" id="tv_us10y"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">US30Y (Daily)</h3>
                    <div class="widget-container" id="tv_us30y"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">GVZ (Daily)</h3>
                    <div class="widget-container" id="tv_gvz"></div>
                </div>
                <div class="col-span-1">
                    <h3 class="text-sm md:text-lg font-semibold mb-1 text-slate-200">WTI (M5)</h3>
                    <div class="widget-container" id="tv_wti"></div>
                </div>
            </div>
        </section>

        <!-- ส่วนที่ 3: Economic Calendar -->
        <section>
            <h2 class="text-base md:text-2xl font-bold mb-2 md:mb-4 text-purple-400 border-b border-slate-700 pb-2 flex items-center gap-2">
                <svg class="w-4 h-4 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                ปฏิทินเศรษฐกิจ (วันนี้)
            </h2>
            
            <div class="widget-container" style="height: 400px; background-color: #ffffff;">
                <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&features=timezone&countries=25,32,6,37,72,22,17,39,14,10,35,43,56,36,110,11,26,12,4,5&calType=day&timeZone=18&lang=1" width="100%" height="100%" frameborder="0" allowtransparency="true" marginwidth="0" marginheight="0"></iframe>
            </div>
            
            <div class="mt-2 flex justify-end">
                <a href="https://th.investing.com/economic-calendar/" target="_blank" rel="noopener noreferrer" class="text-xs md:text-sm font-medium text-blue-400 hover:text-blue-300 flex items-center gap-1 transition-colors bg-slate-800 py-1.5 px-3 rounded border border-slate-700">
                    <span>เปิด th.investing.com แบบเต็มจอ</span>
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>
            </div>
        </section>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        function createWidget(container_id, symbol, interval) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": interval,
                "timezone": "Asia/Bangkok",
                "theme": "dark",
                "style": "1",
                "locale": "th_TH",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": container_id,
                "hide_volume": true,
                "studies": [
                    "MAExp@tv-basicstudies"
                ],
                "studies_overrides": {
                    "moving average exponential.length": 5,
                    "moving average exponential.plot.color": "#ffffff",
                    "moving average exponential.plot.linewidth": 2,
                    "moving average exponential.ema.color": "#ffffff",
                    "moving average exponential.ema.linewidth": 2,
                    "Exponential Moving Average.length": 5,
                    "Exponential Moving Average.plot.color": "#ffffff"
                }
            });
        }

        // โหลดกราฟ XAUUSD
        createWidget("tv_m5", "OANDA:XAUUSD", "5");
        createWidget("tv_m15", "OANDA:XAUUSD", "15");
        createWidget("tv_h1", "OANDA:XAUUSD", "60");
        createWidget("tv_h4", "OANDA:XAUUSD", "240");

        // โหลดกราฟ Macro & Yields (แก้ไข 4 ตัวที่ติดลิขสิทธิ์ให้กลับเป็น Daily)
        createWidget("tv_dxy", "CAPITALCOM:DXY", "5"); 
        createWidget("tv_us02y", "TVC:US02Y", "D");        // ต้องใช้ Daily เพื่อเลี่ยงการโดนบล็อก
        createWidget("tv_us10y", "TVC:US10Y", "D");       // ต้องใช้ Daily เพื่อเลี่ยงการโดนบล็อก
        createWidget("tv_us30y", "TVC:US30Y", "D");       // ต้องใช้ Daily เพื่อเลี่ยงการโดนบล็อก
        createWidget("tv_gvz", "CBOE:GVZ", "D");          // ต้องใช้ Daily เพื่อเลี่ยงการโดนบล็อก
        createWidget("tv_wti", "CAPITALCOM:USOIL", "5"); 
    </script>
</body>
</html>
